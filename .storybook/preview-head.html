<link rel="icon" href="/favicon-storybook.ico" />

<script>
  (function () {
    try {
      var theme = localStorage.getItem("storybook-theme") || "light";
      var html = document.documentElement;
      html.classList.toggle("themeDark", theme === "dark");
      var style = document.createElement("style");
      style.innerHTML =
        "body{background:" + (theme === "dark" ? "#000" : "#fff") + "}";
      document.head.appendChild(style);
    } catch (e) {}
  })();
</script>
